# ================================================
# TripSalama - Nginx Configuration Snippet
# PHP 8.4 FPM - Secure & Performant
# ================================================
# IMPORTANT: This file is managed by TripSalama project
# It is included by the main Helios nginx config
# DO NOT add server blocks here, only location blocks
# ================================================

# APK downloads - MUST be BEFORE main location for priority
location ^~ /internal/tripsalama/downloads/ {
    alias /var/www/tripsalama/public/downloads/;

    # Force APK MIME type for Android installation
    types { }
    default_type application/vnd.android.package-archive;

    # Cache and download headers
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header Content-Disposition "attachment";

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Directory listing disabled for security
    autoindex off;

    # Logging
    access_log /var/log/nginx/tripsalama-apk-access.log;
    error_log /var/log/nginx/tripsalama-apk-error.log;
}

# TripSalama application
# ^~ prefix ensures this location takes priority over regex locations
location ^~ /internal/tripsalama {
    alias /var/www/tripsalama/public;
    index index.php;

    # ========================================
    # SECURITY HEADERS
    # ========================================
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy - Allow camera and geolocation for ride-sharing
    add_header Permissions-Policy "accelerometer=(), camera=(self), geolocation=(self), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # ========================================
    # PERFORMANCE - GZIP COMPRESSION
    # ========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ========================================
    # STATIC FILES - AGGRESSIVE CACHING
    # ========================================
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        # Gzip for CSS/JS
        gzip_static on;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        # Disable access log for static assets
        access_log off;
    }

    # ========================================
    # SECURITY - BLOCK SENSITIVE FILES
    # ========================================
    location ~ /\.(ht|git|env|svn) {
        deny all;
        return 404;
    }

    location ~ \.(sql|bak|old|orig|swp)$ {
        deny all;
        return 404;
    }

    # Block access to PHP files in uploads
    location ~* /uploads/.*\.php$ {
        deny all;
        return 404;
    }

    # ========================================
    # API ROUTING - Route /api/endpoint to /api/endpoint.php
    # ========================================
    location ~* ^/internal/tripsalama/api/([^/]+)$ {
        # Route API calls to the correct PHP file
        # /internal/tripsalama/api/user -> /var/www/tripsalama/public/api/user.php
        set $api_script /var/www/tripsalama/public/api/$1.php;

        # FastCGI configuration
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $api_script;
        fastcgi_param DOCUMENT_ROOT /var/www/tripsalama/public;
        fastcgi_param REQUEST_URI $request_uri;

        # Security headers for API
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        # Timeouts
        fastcgi_read_timeout 60;
        fastcgi_send_timeout 60;
    }

    # ========================================
    # PHP FILES PROCESSING
    # ========================================
    location ~ \.php$ {
        # Calculate the actual file path for alias
        set $script_path /var/www/tripsalama/public;
        if ($uri ~ "^/internal/tripsalama/(.*)$") {
            set $script_path /var/www/tripsalama/public/$1;
        }

        # FastCGI configuration
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $script_path;
        fastcgi_param DOCUMENT_ROOT /var/www/tripsalama/public;
        fastcgi_param REQUEST_URI $request_uri;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Permissions Policy - Allow camera and geolocation
        add_header Permissions-Policy "accelerometer=(), camera=(self), geolocation=(self), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

        # FastCGI buffering for performance
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;

        # Timeouts for long-running scripts
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # Front controller pattern - route all non-file requests to index.php
    try_files $uri $uri/ @tripsalama_php;
}

# Named location for TripSalama front controller
location @tripsalama_php {
    rewrite ^/internal/tripsalama/(.*)$ /internal/tripsalama/index.php?$query_string last;
}
