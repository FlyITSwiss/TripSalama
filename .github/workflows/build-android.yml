name: Build Android APK

on:
  push:
    branches: [main, develop]
    paths:
      - 'public/**'
      - 'android/**'
      - 'capacitor.config.json'
      - 'package.json'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '17'
  KEYSTORE_PASSWORD: tripsalama2026
  KEY_ALIAS: tripsalama
  KEY_PASSWORD: tripsalama2026

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Verify Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME/platforms/ || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix adaptive-icon placement
        run: |
          # Remove adaptive-icon from drawable-v24 (requires SDK 26+)
          rm -f android/app/src/main/res/drawable-v24/ic_launcher.xml
          rm -f android/app/src/main/res/drawable-v24/ic_launcher_round.xml
          echo "Cleaned up adaptive-icon files from drawable-v24"

      - name: Generate Android icons
        run: node scripts/generate-android-icons.js
        continue-on-error: true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Setup Keystore for Signing
        run: |
          # Generate keystore for release signing
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias $KEY_ALIAS \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass $KEYSTORE_PASSWORD \
            -keypass $KEY_PASSWORD \
            -dname "CN=TripSalama, OU=Mobile, O=Stabilis IT, L=Geneva, ST=Geneva, C=CH"

          # Create keystore.properties
          cat > android/keystore.properties << EOF
          storeFile=app/release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Clean and Build Debug APK
        working-directory: android
        run: ./gradlew clean assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tripsalama-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK (Signed)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK (Signed)
        uses: actions/upload-artifact@v4
        with:
          name: tripsalama-release-signed-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: warn
