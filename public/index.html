<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
    <meta name="theme-color" content="#2D5A4A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TripSalama">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">

    <title>TripSalama</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2D5A4A 0%, #1A3D33 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .splash {
            text-align: center;
            color: white;
        }

        .splash-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 24px;
        }

        .splash-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .splash-subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 32px;
        }

        .splash-loading {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        .splash-status {
            font-size: 12px;
            opacity: 0.7;
        }

        .error-container {
            display: none;
            text-align: center;
            color: white;
            padding: 24px;
        }

        .error-container.visible {
            display: block;
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .error-message {
            font-size: 16px;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .retry-btn {
            background: white;
            color: #2D5A4A;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash" class="splash">
        <svg class="splash-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="white" fill-opacity="0.15"/>
            <path d="M50 15C30.67 15 15 30.67 15 50s15.67 35 35 35 35-15.67 35-35S69.33 15 50 15zm0 63c-15.46 0-28-12.54-28-28s12.54-28 28-28 28 12.54 28 28-12.54 28-28 28z" fill="white"/>
            <path d="M50 30c-11.05 0-20 8.95-20 20s8.95 20 20 20 20-8.95 20-20-8.95-20-20-20zm0 33c-7.18 0-13-5.82-13-13s5.82-13 13-13 13 5.82 13 13-5.82 13-13 13z" fill="white"/>
            <circle cx="50" cy="50" r="8" fill="#D4A574"/>
        </svg>
        <div class="splash-title">TripSalama</div>
        <div class="splash-subtitle">Sécurité et sérénité au féminin</div>
        <div class="splash-loading"></div>
        <div id="status" class="splash-status">Connexion en cours...</div>
    </div>

    <!-- Error Container -->
    <div id="error" class="error-container">
        <div class="error-icon">📡</div>
        <div class="error-message">
            Impossible de se connecter au serveur.<br>
            Vérifiez votre connexion internet.
        </div>
        <button class="retry-btn" onclick="loadApp()">Réessayer</button>
    </div>

    <script>
        // Configuration
        const APP_URL = 'https://stabilis-it.ch/internal/tripsalama';
        const TIMEOUT_MS = 10000;

        // État de l'app
        let isNative = false;
        let retryCount = 0;

        // Détecter si on est dans Capacitor
        function checkCapacitor() {
            return window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform();
        }

        // Mettre à jour le statut
        function setStatus(text) {
            const el = document.getElementById('status');
            if (el) el.textContent = text;
        }

        // Afficher l'erreur
        function showError() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('error').classList.add('visible');
        }

        // Masquer l'erreur
        function hideError() {
            document.getElementById('splash').style.display = 'block';
            document.getElementById('error').classList.remove('visible');
        }

        // Charger l'application
        async function loadApp() {
            hideError();
            setStatus('Connexion en cours...');

            isNative = checkCapacitor();
            console.log('Platform:', isNative ? 'Native (Capacitor)' : 'Web');

            try {
                // Vérifier la connectivité
                setStatus('Vérification du réseau...');

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), TIMEOUT_MS);

                const response = await fetch(APP_URL + '/api/auth?action=check', {
                    method: 'GET',
                    credentials: 'include',
                    signal: controller.signal,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error('Server responded with ' + response.status);
                }

                const data = await response.json();
                console.log('Auth check:', data);

                setStatus('Chargement de l\'application...');

                // Rediriger vers l'app
                if (data.authenticated) {
                    const dashboard = data.user.role === 'driver' ? '/driver/dashboard' : '/passenger/dashboard';
                    window.location.href = APP_URL + dashboard;
                } else {
                    window.location.href = APP_URL + '/login';
                }

            } catch (error) {
                console.error('Load error:', error);
                retryCount++;

                if (retryCount < 3) {
                    setStatus('Nouvelle tentative (' + retryCount + '/3)...');
                    setTimeout(loadApp, 2000);
                } else {
                    showError();
                }
            }
        }

        // Initialiser Capacitor si disponible
        async function initCapacitor() {
            if (!checkCapacitor()) return;

            try {
                const { Capacitor } = window;
                const plugins = Capacitor.Plugins;

                // Status Bar
                if (plugins.StatusBar) {
                    await plugins.StatusBar.setBackgroundColor({ color: '#2D5A4A' });
                    await plugins.StatusBar.setStyle({ style: 'DARK' });
                }

                // Splash Screen natif
                if (plugins.SplashScreen) {
                    await plugins.SplashScreen.hide();
                }

                // Back button (Android)
                if (plugins.App) {
                    plugins.App.addListener('backButton', ({ canGoBack }) => {
                        if (canGoBack) {
                            window.history.back();
                        } else {
                            plugins.App.exitApp();
                        }
                    });
                }

                console.log('Capacitor initialized');
            } catch (e) {
                console.warn('Capacitor init error:', e);
            }
        }

        // Démarrer
        document.addEventListener('DOMContentLoaded', async () => {
            await initCapacitor();
            loadApp();
        });

        // Aussi gérer deviceready pour Cordova/Capacitor
        document.addEventListener('deviceready', async () => {
            await initCapacitor();
            loadApp();
        }, false);
    </script>
</body>
</html>
